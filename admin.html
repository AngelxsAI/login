<<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Store</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="admin-container">
    <h1>💎 Panel de Productos</h1>

    <form id="product-form">
      <input type="text" id="name" placeholder="Nombre del producto" required />
      <input type="text" id="category" placeholder="Categoría" />
      <input type="text" id="price" placeholder="Precio" required />
      <input type="text" id="image_url" placeholder="URL de imagen" />
      <textarea id="description" placeholder="Descripción"></textarea>
      <button type="submit">Subir Producto</button>
    </form>

    <div id="status"></div>
    <hr/>
    <h2>Productos existentes</h2>
    <ul id="products-list"></ul>
  </main>

<script src="admin.js"></script>
</body>
</html>
